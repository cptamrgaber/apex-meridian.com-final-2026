# ============================================================
# Apex Meridian — Docker Compose (Development / Self-Hosted)
# Author: Amro Gaber
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker-compose up --build
#   3. Visit http://localhost:3000
# ============================================================

version: "3.9"

services:

  # ── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: apex-meridian-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-apex_meridian}
      MYSQL_USER: ${DB_USER:-apexuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apexpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - apex-network

  # ── Application Server ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: apex-meridian-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-apexuser}:${DB_PASSWORD:-apexpassword}@db:3306/${DB_NAME:-apex_meridian}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      VITE_APP_ID: ${VITE_APP_ID}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Apex Meridian}
      VITE_APP_LOGO: ${VITE_APP_LOGO}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME:-Amro Gaber}
      RESEND_API_KEY: ${RESEND_API_KEY}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID}
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    networks:
      - apex-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy (optional, for SSL + custom domain) ──
  nginx:
    image: nginx:alpine
    container_name: apex-meridian-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - apex-network
    profiles:
      - production   # Only starts with: docker-compose --profile production up

volumes:
  db_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local

networks:
  apex-network:
    driver: bridge
