# ============================================================
# Apex Meridian — Docker Compose (Local Development)
# Author: Amro Gaber
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#
# This runs a MySQL container only. The app runs on your host
# machine with hot-reload: pnpm dev
# ============================================================

version: "3.9"

services:

  # ── MySQL Database (dev) ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: apex-meridian-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: apex_meridian_dev
      MYSQL_USER: apexuser
      MYSQL_PASSWORD: apexpassword
    ports:
      - "3306:3306"
    volumes:
      - db_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── phpMyAdmin (optional DB GUI) ──────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: apex-meridian-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"

volumes:
  db_dev_data:
    driver: local
